<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications | Peixian MA</title>
    <link rel="icon" type="image/png" href="/assets/img/web-app-manifest-192x192.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/assets/img/web-app-manifest-512x512.png" sizes="16x16">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/img/apple-touch-icon.png">
    <link rel="manifest" href="../assets/img/site.webmanifest">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Pacifico&family=Satisfy&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="../js/components/Navbar.js"></script>
    <script src="../js/components/DetailedPublicationList.js"></script>
    <style>
        .publications-container {
            max-width: 1100px;
            margin: 80px auto 0;
            padding: 2rem;
            background-color: transparent;
            min-height: calc(100vh - 80px);
        }

        .publications-header {
            text-align: left;
            margin-bottom: 3rem;
            padding: 2rem 0;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            transition: border-color 0.3s ease;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .back-home:hover {
            color: var(--primary-color);
            transform: translateX(-5px);
        }

        .back-home i {
            font-size: 0.8rem;
        }

        .publications-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.75rem;
            font-family: var(--font-family);
            letter-spacing: -0.02em;
            transition: color 0.3s ease;
        }

        .publications-header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.6;
            font-family: 'Inter', sans-serif;
            transition: color 0.3s ease;
        }

        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        .filter-group {
            background: none;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
            border: none;
        }

        .filter-group-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-family: 'Inter', sans-serif;
            transition: color 0.3s ease;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.75rem;
        }

        .filter-button {
            padding: 0.4rem 0;
            border: none;
            border-bottom: 2px solid transparent;
            border-radius: 0;
            background: none;
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-button:hover {
            color: var(--primary-color);
            border-bottom-color: var(--primary-light);
            transform: none;
            box-shadow: none;
            background: none;
        }

        .filter-button.active {
            color: var(--primary-color);
            border-bottom-color: var(--primary-color);
            background: none;
            box-shadow: none;
        }

        .filter-button.active:hover {
            transform: none;
            box-shadow: none;
        }

        @media (max-width: 768px) {
            .publications-container {
                padding: 1.5rem;
                margin-top: 60px;
            }

            .publications-header h1 {
                font-size: 2rem;
            }

            .filter-section {
                gap: 2rem;
            }
        }
    </style>
</head>
<body>
    <nav-bar></nav-bar>

    <div class="publications-container">
        <div class="publications-header">
            <a href="../index.html" class="back-home">
                <i class="fas fa-arrow-left"></i>
                Back to Home
            </a>
            <h1>Publications</h1>
            <p>A comprehensive list of my research publications</p>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <div class="filter-group-title">
                    <i class="fas fa-layer-group"></i>
                    By Venue Type
                </div>
                <div class="filter-buttons">
                    <button class="filter-button active" data-filter="all">
                        <i class="fas fa-globe"></i> All
                    </button>
                    <button class="filter-button" data-filter="conference">
                        <i class="fas fa-users"></i> Conference
                    </button>
                    <button class="filter-button" data-filter="journal">
                        <i class="fas fa-newspaper"></i> Journal
                    </button>
                    <button class="filter-button" data-filter="preprint">
                        <i class="fas fa-file-alt"></i> Preprint
                    </button>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-group-title">
                    <i class="fas fa-tags"></i>
                    By Research Area
                </div>
                <div class="filter-buttons">
                    <button class="filter-button" data-filter="AI for Database Application">
                        <i class="fas fa-database"></i> AI for Database Application
                    </button>
                    <button class="filter-button" data-filter="AI For Finance">
                        <i class="fas fa-chart-line"></i> AI For Finance
                    </button>
                    <button class="filter-button" data-filter="Large Language Models">
                        <i class="fas fa-brain"></i> Large Language Models
                    </button>
                    <button class="filter-button" data-filter="Machine Learning">
                        <i class="fas fa-heartbeat"></i> Machine Learning
                    </button>
                </div>
            </div>
        </div>

        <detailed-publication-list></detailed-publication-list>
    </div>

    <!-- Back to Top Button -->
    <button id="back-to-top" class="back-to-top" aria-label="Back to Top">
        <i class="fas fa-chevron-up"></i>
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const backToTopBtn = document.getElementById('back-to-top');

            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    backToTopBtn.classList.add('visible');
                } else {
                    backToTopBtn.classList.remove('visible');
                }
            });

            backToTopBtn.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });

            const filterButtons = document.querySelectorAll('.filter-button');
            const publicationList = document.querySelector('detailed-publication-list');

            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');

                    const filter = button.dataset.filter;
                    publicationList.filterPublications(filter);
                });
            });
        });
    </script>
</body>
</html>
