<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications | Peixian MA</title>
    <link rel="icon" href="/assets/img/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/img/apple-touch-icon.png">
    <link rel="manifest" href="../assets/img/site.webmanifest">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Pacifico&family=Satisfy&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&family=Sansation:wght@400;700&display=swap" rel="stylesheet">
    <script src="../js/components/Navbar.js"></script>
    <script src="../js/components/DetailedPublicationList.js"></script>
    <style>
        .publications-container {
            max-width: 1100px;
            margin: 80px auto 0;
            padding: 2rem;
            background-color: transparent;
            min-height: calc(100vh - 80px);
        }

        .publications-header {
            text-align: left;
            margin-bottom: 3rem;
            padding: 2rem 0;
            border-bottom: 1px solid var(--border-color);
            position: relative;
            transition: border-color 0.3s ease;
        }

        .back-home {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            text-decoration: none;
            color: var(--text-secondary);
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            transition: all 0.2s ease;
            font-family: 'Inter', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .back-home:hover {
            color: var(--primary-color);
            transform: translateX(-5px);
        }

        .back-home i {
            font-size: 0.8rem;
        }

        .publications-header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 0.75rem;
            font-family: var(--font-family);
            letter-spacing: -0.02em;
            transition: color 0.3s ease;
        }

        .publications-header p {
            font-size: 1.1rem;
            color: var(--text-secondary);
            margin: 0;
            line-height: 1.6;
            font-family: 'Inter', sans-serif;
            transition: color 0.3s ease;
        }

        .filter-section {
            display: flex;
            flex-direction: column;
            gap: 1.75rem;
            margin-bottom: 3rem;
        }

        .filter-group {
            background: none;
            border-radius: 0;
            padding: 0;
            box-shadow: none;
            border: none;
        }

        .filter-group-title {
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-secondary);
            margin-bottom: 0.85rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-family: var(--font-sansation, 'Sansation', sans-serif);
            transition: color 0.3s ease;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
        }

        .filter-button {
            padding: 0.45rem 0.9rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            font-family: var(--font-sansation, 'Sansation', sans-serif);
            transition: color 0.2s ease, background 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.45rem;
            line-height: 1.3;
        }

        .filter-button i {
            font-size: 0.8rem;
            opacity: 0.85;
        }

        .filter-button:hover {
            color: var(--primary-color);
            border-color: rgba(108, 92, 231, 0.35);
            background: rgba(108, 92, 231, 0.06);
            box-shadow: 0 2px 8px rgba(108, 92, 231, 0.08);
        }

        .filter-button.active {
            color: #ffffff;
            border-color: var(--primary-color);
            background: var(--primary-color);
            box-shadow: 0 2px 10px rgba(108, 92, 231, 0.28);
        }

        .filter-button.active i {
            opacity: 1;
        }

        .filter-button.active:hover {
            color: #ffffff;
            background: #5a4bd1;
            border-color: #5a4bd1;
            box-shadow: 0 3px 12px rgba(108, 92, 231, 0.35);
        }

        [data-theme="dark"] .filter-button {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.12);
        }

        [data-theme="dark"] .filter-button:hover {
            background: rgba(162, 155, 254, 0.12);
            border-color: rgba(162, 155, 254, 0.4);
            color: var(--primary-light);
            box-shadow: none;
        }

        [data-theme="dark"] .filter-button.active {
            color: #0f0f14;
            background: var(--primary-light);
            border-color: var(--primary-light);
            box-shadow: 0 2px 12px rgba(162, 155, 254, 0.25);
        }

        [data-theme="dark"] .filter-button.active:hover {
            color: #0f0f14;
            background: #c7c2ff;
            border-color: #c7c2ff;
        }

        @media (max-width: 768px) {
            .publications-container {
                padding: 1.5rem;
                margin-top: 60px;
            }

            .publications-header h1 {
                font-size: 2rem;
            }

            .filter-section {
                gap: 1.5rem;
            }

            .filter-button {
                padding: 0.4rem 0.75rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
    <nav-bar></nav-bar>

    <div class="publications-container">
        <div class="publications-header">
            <a href="../index.html" class="back-home">
                <i class="fas fa-arrow-left"></i>
                Back to Home
            </a>
            <h1>Publications</h1>
            <p>A comprehensive list of my research publications</p>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <div class="filter-group-title">
                    <i class="fas fa-layer-group"></i>
                    By Venue Type
                </div>
                <div class="filter-buttons">
                    <button class="filter-button active" data-filter="all" data-label="All">
                        <i class="fas fa-globe"></i> <span class="filter-button-text">All</span>
                    </button>
                    <button class="filter-button" data-filter="conference" data-label="Conference">
                        <i class="fas fa-users"></i> <span class="filter-button-text">Conference</span>
                    </button>
                    <button class="filter-button" data-filter="journal" data-label="Journal">
                        <i class="fas fa-newspaper"></i> <span class="filter-button-text">Journal</span>
                    </button>
                    <button class="filter-button" data-filter="preprint" data-label="Preprint">
                        <i class="fas fa-file-alt"></i> <span class="filter-button-text">Preprint</span>
                    </button>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-group-title">
                    <i class="fas fa-tags"></i>
                    By Research Area
                </div>
                <div class="filter-buttons">
                    <button class="filter-button" data-filter="AI for Database" data-label="AI for Database">
                        <i class="fas fa-database"></i> <span class="filter-button-text">AI for Database</span>
                    </button>
                    <button class="filter-button" data-filter="AI For Finance" data-label="AI For Finance">
                        <i class="fas fa-chart-line"></i> <span class="filter-button-text">AI For Finance</span>
                    </button>
                    <button class="filter-button" data-filter="Large Language Models" data-label="Large Language Models">
                        <i class="fas fa-brain"></i> <span class="filter-button-text">Large Language Models</span>
                    </button>
                    <button class="filter-button" data-filter="Machine Learning" data-label="Machine Learning">
                        <i class="fas fa-heartbeat"></i> <span class="filter-button-text">Machine Learning</span>
                    </button>
                </div>
            </div>
        </div>

        <detailed-publication-list></detailed-publication-list>
    </div>

    <!-- Back to Top Button -->
    <button id="back-to-top" class="back-to-top" aria-label="Back to Top">
        <i class="fas fa-chevron-up"></i>
    </button>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const backToTopBtn = document.getElementById('back-to-top');

            window.addEventListener('scroll', () => {
                if (window.pageYOffset > 300) {
                    backToTopBtn.classList.add('visible');
                } else {
                    backToTopBtn.classList.remove('visible');
                }
            });

            backToTopBtn.addEventListener('click', () => {
                window.scrollTo({
                    top: 0,
                    behavior: 'smooth'
                });
            });

            const filterButtons = document.querySelectorAll('.filter-button');
            const publicationList = document.querySelector('detailed-publication-list');

            function updateActiveButtonCount(activeButton) {
                filterButtons.forEach(btn => {
                    const text = btn.querySelector('.filter-button-text');
                    if (text) text.textContent = btn.dataset.label;
                });

                if (!activeButton || typeof publicationList.getFilterCount !== 'function') return;

                const count = publicationList.getFilterCount(activeButton.dataset.filter);
                const text = activeButton.querySelector('.filter-button-text');
                if (text) text.textContent = `${activeButton.dataset.label} (${count})`;
            }

            function initFilterCounts() {
                const activeButton = document.querySelector('.filter-button.active');
                if (publicationList.publications && publicationList.publications.length > 0) {
                    updateActiveButtonCount(activeButton);
                    return true;
                }
                return false;
            }

            // Wait until publication data is loaded, then show count on default "All"
            const countInit = setInterval(() => {
                if (initFilterCounts()) clearInterval(countInit);
            }, 50);
            setTimeout(() => clearInterval(countInit), 5000);

            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');

                    const filter = button.dataset.filter;
                    publicationList.filterPublications(filter);
                    updateActiveButtonCount(button);
                });
            });
        });
    </script>
</body>
</html>
