<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Publications | Peixian MA</title>
    <link rel="icon" type="image/png" href="/assets/img/web-app-manifest-192x192.png" sizes="32x32">
    <link rel="icon" type="image/png" href="/assets/img/web-app-manifest-512x512.png" sizes="16x16">
    <link rel="apple-touch-icon" sizes="180x180" href="../assets/img/apple-touch-icon.png">
    <link rel="manifest" href="../assets/img/site.webmanifest">
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;500;600;700&family=Pacifico&family=Satisfy&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="../js/components/Navbar.js"></script>
    <script src="../js/components/DetailedPublicationList.js"></script>
    <style>
        .publications-container {
            max-width: 1100px;
            margin: 80px auto 0;
            padding: 2rem;
            background-color: #f5f6fa;
            min-height: calc(100vh - 80px);
        }

        .publications-header {
            text-align: center;
            margin-bottom: 2rem;
            padding: 1.5rem 0;
        }

        .publications-header h1 {
            font-size: 2.2rem;
            font-weight: 600;
            color: #2d3436;
            margin-bottom: 0.5rem;
            font-family: 'Dancing Script', cursive;
        }

        .publications-header p {
            font-size: 1rem;
            color: #636e72;
            margin: 0 auto;
            line-height: 1.5;
        }

        .filter-section {
            display: flex;
            gap: 1.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 280px;
            background: white;
            border-radius: 12px;
            padding: 1.5rem;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .filter-group-title {
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #a4b0be;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-group-title i {
            font-size: 0.9rem;
        }

        .filter-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        .filter-button {
            padding: 0.5rem 1rem;
            border: 1.5px solid #e9ecef;
            border-radius: 8px;
            background: white;
            color: #636e72;
            font-weight: 500;
            font-size: 0.9rem;
            cursor: pointer;
            font-family: var(--font-family);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
        }

        .filter-button:hover {
            border-color: #6c5ce7;
            background: rgba(108, 92, 231, 0.05);
            transform: translateY(-1px);
            box-shadow: 0 2px 8px rgba(108, 92, 231, 0.1);
        }

        .filter-button.active {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            color: white;
            border-color: #6c5ce7;
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.25);
        }

        .filter-button.active:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 16px rgba(108, 92, 231, 0.35);
        }

        .filter-button i {
            font-size: 0.85rem;
        }

        @media (max-width: 768px) {
            .publications-container {
                padding: 1rem;
                margin-top: 60px;
            }

            .publications-header h1 {
                font-size: 1.8rem;
            }

            .filter-section {
                gap: 1rem;
            }

            .filter-group {
                min-width: 100%;
                padding: 1.25rem;
            }

            .filter-button {
                padding: 0.4rem 0.8rem;
                font-size: 0.85rem;
            }
        }
    </style>
</head>
<body>
    <nav-bar></nav-bar>

    <div class="publications-container">
        <div class="publications-header">
            <h1>Publications</h1>
            <p>A comprehensive list of my research publications</p>
        </div>

        <div class="filter-section">
            <div class="filter-group">
                <div class="filter-group-title">
                    <i class="fas fa-layer-group"></i>
                    By Venue Type
                </div>
                <div class="filter-buttons">
                    <button class="filter-button active" data-filter="all">
                        <i class="fas fa-globe"></i> All
                    </button>
                    <button class="filter-button" data-filter="conference">
                        <i class="fas fa-users"></i> Conference
                    </button>
                    <button class="filter-button" data-filter="journal">
                        <i class="fas fa-newspaper"></i> Journal
                    </button>
                    <button class="filter-button" data-filter="preprint">
                        <i class="fas fa-file-alt"></i> Preprint
                    </button>
                </div>
            </div>

            <div class="filter-group">
                <div class="filter-group-title">
                    <i class="fas fa-tags"></i>
                    By Research Area
                </div>
                <div class="filter-buttons">
                    <button class="filter-button" data-filter="Database & AI">
                        <i class="fas fa-database"></i> Database & AI
                    </button>
                    <button class="filter-button" data-filter="Machine Learning">
                        <i class="fas fa-brain"></i> Machine Learning
                    </button>
                    <button class="filter-button" data-filter="Medical AI">
                        <i class="fas fa-heartbeat"></i> Medical AI
                    </button>
                </div>
            </div>
        </div>

        <detailed-publication-list></detailed-publication-list>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const filterButtons = document.querySelectorAll('.filter-button');
            const publicationList = document.querySelector('detailed-publication-list');

            filterButtons.forEach(button => {
                button.addEventListener('click', () => {
                    filterButtons.forEach(btn => btn.classList.remove('active'));
                    button.classList.add('active');

                    const filter = button.dataset.filter;
                    publicationList.filterPublications(filter);
                });
            });
        });
    </script>
</body>
</html>
